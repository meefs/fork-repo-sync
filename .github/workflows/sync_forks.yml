name: Sync All Forks

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run: report what would be synced without actually syncing'
        required: false
        default: false
        type: boolean
  schedule:
    # Off-round minutes avoid GitHub's :00/:15/:30/:45 global cron queue
    # contention, which silently drops scheduled runs under load.
    - cron: '3,18,33,48 * * * *'

concurrency:
  group: sync-forks
  cancel-in-progress: true

jobs:
  sync-forks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Sync all forks via merge-upstream API
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          OWNER: meefs
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          # No `set -e`: per-repo failures must not break the loop.
          set -u -o pipefail

          if ! command -v jq >/dev/null; then
            echo "::error::jq is required but not installed"
            exit 1
          fi

          API="https://api.github.com"
          HDR_AUTH="Authorization: token $GITHUB_TOKEN"
          HDR_ACCEPT="Accept: application/vnd.github+json"
          HDR_VER="X-GitHub-Api-Version: 2022-11-28"

          PER_PAGE=100
          PAGE=1

          SYNCED=()
          IN_SYNC=()
          DIVERGED=()
          NO_UPSTREAM=()
          FAILED=()
          DRY_WOULD_SYNC=()

          echo "Fetching forks for $OWNER (dry_run=$DRY_RUN)..."

          while :; do
            REPOS=$(curl -sS \
              -H "$HDR_AUTH" -H "$HDR_ACCEPT" -H "$HDR_VER" \
              "$API/users/$OWNER/repos?type=forks&per_page=$PER_PAGE&page=$PAGE")

            COUNT=$(echo "$REPOS" | jq 'if type=="array" then length else 0 end')
            if [ "$COUNT" -eq 0 ]; then
              break
            fi

            echo "::group::Page $PAGE ($COUNT repos)"

            while IFS= read -r ROW; do
              REPO_JSON=$(echo "$ROW" | base64 -d)
              FORK_FULL=$(echo "$REPO_JSON" | jq -r '.full_name')
              FORK_BRANCH=$(echo "$REPO_JSON" | jq -r '.default_branch // empty')

              if [ -z "$FORK_BRANCH" ]; then
                echo "[no-branch] $FORK_FULL — no default branch, skipping"
                NO_UPSTREAM+=("$FORK_FULL (no default branch)")
                continue
              fi

              # Parent info isn't in the list endpoint; fetch the single repo.
              REPO_INFO=$(curl -sS -w "\n%{http_code}" \
                -H "$HDR_AUTH" -H "$HDR_ACCEPT" -H "$HDR_VER" \
                "$API/repos/$FORK_FULL")
              REPO_HTTP=$(echo "$REPO_INFO" | tail -n1)
              REPO_BODY=$(echo "$REPO_INFO" | sed '$d')

              if [ "$REPO_HTTP" != "200" ]; then
                echo "[lookup-failed:$REPO_HTTP] $FORK_FULL"
                FAILED+=("$FORK_FULL (lookup HTTP $REPO_HTTP)")
                continue
              fi

              PARENT_FULL=$(echo "$REPO_BODY" | jq -r '.parent.full_name // empty')
              PARENT_BRANCH=$(echo "$REPO_BODY" | jq -r '.parent.default_branch // empty')

              if [ -z "$PARENT_FULL" ] || [ -z "$PARENT_BRANCH" ]; then
                echo "[no-upstream] $FORK_FULL — parent deleted or inaccessible"
                NO_UPSTREAM+=("$FORK_FULL")
                continue
              fi

              # Compare fork's default branch against upstream's default branch.
              # Order is upstream...fork so ahead/behind/status are reported from
              # the fork's perspective: status=behind => fork needs sync.
              PARENT_OWNER=${PARENT_FULL%%/*}
              PARENT_NAME=${PARENT_FULL##*/}
              COMPARE=$(curl -sS \
                -H "$HDR_AUTH" -H "$HDR_ACCEPT" -H "$HDR_VER" \
                "$API/repos/$FORK_FULL/compare/$PARENT_OWNER:$PARENT_NAME:$PARENT_BRANCH...$FORK_BRANCH")

              STATUS=$(echo "$COMPARE" | jq -r '.status // "error"')
              BEHIND=$(echo "$COMPARE" | jq -r '.behind_by // 0')
              AHEAD=$(echo "$COMPARE" | jq -r '.ahead_by // 0')

              case "$STATUS" in
                identical|ahead)
                  # Fork is at or ahead of upstream's tip — nothing to pull.
                  IN_SYNC+=("$FORK_FULL")
                  ;;
                behind)
                  if [ "$DRY_RUN" = "true" ]; then
                    echo "[would-sync] $FORK_FULL (behind by $BEHIND)"
                    DRY_WOULD_SYNC+=("$FORK_FULL (behind by $BEHIND)")
                  else
                    MERGE_RESP=$(curl -sS -o /tmp/merge_resp.json -w "%{http_code}" \
                      -X POST \
                      -H "$HDR_AUTH" -H "$HDR_ACCEPT" -H "$HDR_VER" \
                      -d "{\"branch\":\"$FORK_BRANCH\"}" \
                      "$API/repos/$FORK_FULL/merge-upstream")

                    if [ "$MERGE_RESP" = "200" ]; then
                      MERGE_TYPE=$(jq -r '.merge_type // "unknown"' /tmp/merge_resp.json)
                      echo "[synced:$MERGE_TYPE] $FORK_FULL (was $BEHIND behind)"
                      SYNCED+=("$FORK_FULL")
                    elif [ "$MERGE_RESP" = "409" ]; then
                      echo "[diverged-on-sync] $FORK_FULL ($AHEAD ahead, $BEHIND behind)"
                      DIVERGED+=("$FORK_FULL ($AHEAD ahead, $BEHIND behind)")
                    else
                      ERR_MSG=$(jq -r '.message // "no message"' /tmp/merge_resp.json 2>/dev/null | head -c 200)
                      echo "[failed:$MERGE_RESP] $FORK_FULL — $ERR_MSG"
                      FAILED+=("$FORK_FULL (sync HTTP $MERGE_RESP)")
                    fi
                  fi
                  ;;
                diverged)
                  echo "[diverged] $FORK_FULL ($AHEAD ahead, $BEHIND behind)"
                  DIVERGED+=("$FORK_FULL ($AHEAD ahead, $BEHIND behind)")
                  ;;
                *)
                  ERR_MSG=$(echo "$COMPARE" | jq -r '.message // "unknown"' | head -c 200)
                  echo "[compare-failed] $FORK_FULL — $ERR_MSG"
                  FAILED+=("$FORK_FULL (compare: $ERR_MSG)")
                  ;;
              esac
            done < <(echo "$REPOS" | jq -r '.[] | select(.fork == true) | @base64')

            echo "::endgroup::"
            PAGE=$((PAGE + 1))
          done

          TOTAL=$(( ${#SYNCED[@]} + ${#IN_SYNC[@]} + ${#DIVERGED[@]} + ${#NO_UPSTREAM[@]} + ${#FAILED[@]} + ${#DRY_WOULD_SYNC[@]} ))

          {
            echo "## Sync Summary"
            echo ""
            echo "| Outcome | Count |"
            echo "|---|---|"
            if [ "$DRY_RUN" = "true" ]; then
              echo "| Would sync (dry run) | ${#DRY_WOULD_SYNC[@]} |"
            else
              echo "| Synced | ${#SYNCED[@]} |"
            fi
            echo "| Already in sync | ${#IN_SYNC[@]} |"
            echo "| Diverged (needs manual repair) | ${#DIVERGED[@]} |"
            echo "| No upstream / deleted parent | ${#NO_UPSTREAM[@]} |"
            echo "| Failed | ${#FAILED[@]} |"
            echo "| **Total processed** | **$TOTAL** |"
            echo ""

            if [ "${#DIVERGED[@]}" -gt 0 ]; then
              echo "### Diverged forks (need manual repair)"
              printf -- '- %s\n' "${DIVERGED[@]}"
              echo ""
            fi

            if [ "${#FAILED[@]}" -gt 0 ]; then
              echo "### Failed forks"
              printf -- '- %s\n' "${FAILED[@]}"
              echo ""
            fi

            if [ "${#NO_UPSTREAM[@]}" -gt 0 ]; then
              echo "### Forks with no upstream (parent deleted or inaccessible)"
              printf -- '- %s\n' "${NO_UPSTREAM[@]}"
              echo ""
            fi

            if [ "$DRY_RUN" = "true" ] && [ "${#DRY_WOULD_SYNC[@]}" -gt 0 ]; then
              echo "### Would sync"
              printf -- '- %s\n' "${DRY_WOULD_SYNC[@]}"
              echo ""
            fi
          } | tee -a "$GITHUB_STEP_SUMMARY"
